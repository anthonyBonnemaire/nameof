name: nameof
description: Generator for  Dart class member's names, such as fields, properties, methods, constructors 
version: 0.3.0
homepage: https://github.com/flankb/nameof

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  analyzer: ^8.1.1
  build: ^4.0.4
  source_gen: ^4.2.0
  build_config: ^1.3.0
  nameof_annotation:
    path: ../nameof_annotation/


dev_dependencies:
  build_runner: ^2.10.5
  build_test: ^3.5.10
  source_gen_test: ^1.3.2
  lints: ^6.1.0
  test: ^1.29.0
