name: nameof
description: Generator for  Dart class member's names, such as fields, properties, methods, constructors 
version: 0.3.1
homepage: https://github.com/flankb/nameof

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  analyzer: ^10.0.0
  build: ^4.0.4
  source_gen: ^4.2.0
  build_config: ^1.3.0
  nameof_annotation:
    path: ../nameof_annotation/


dev_dependencies:
  build_runner: ^2.12.2
  build_test: ^3.5.10
  source_gen_test: ^1.3.4
  lints: ^6.1.0
  test: ^1.30.0
